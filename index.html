<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>어디살까 - 영역 관리 시스템</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; margin: 20px; background-color: #f8f9fa; }
        #map { width: 100%; height: 600px; border-radius: 12px; border: 1px solid #ced4da; }
        
        /* 커서 및 인터랙션 스타일 */
        .draw-mode #map, .draw-mode #map * { cursor: crosshair !important; }
        .poly-hover { cursor: pointer !important; }

        .controls { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
        .btn { padding: 12px 20px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; }
        .btn-start { background: #3498db; color: white; }
        
        #sidebar { 
            position: fixed; top: 0; right: -400px; width: 340px; height: 100%; 
            background: white; z-index: 9999; padding: 30px; box-shadow: -5px 0 20px rgba(0,0,0,0.2); 
            transition: 0.3s ease-out; box-sizing: border-box; display: flex; flex-direction: column;
        }
        #sidebar.open { right: 0; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
        
        input, textarea { width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        /* 버튼 컨테이너 및 버튼 스타일 */
        #button-group { display: flex; gap: 10px; margin-top: auto; }
        .btn-full { flex: 1; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; font-size: 15px; }
        .save-color { background: #2ecc71; color: white; }
        .edit-color { background: #3498db; color: white; }
        .delete-color { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div class="controls">
    <button id="btnStart" class="btn btn-start" onclick="toggleDrawing(true)">📍 새 영역 그리기 시작</button>
    <span id="statusMsg" style="color:#666;">영역을 완성하면 '저장', 기존 영역은 '수정/삭제'가 뜹니다.</span>
</div>

<div id="map"></div>

<div id="sidebar">
    <button class="close-btn" onclick="closeSidebar()">&times;</button>
    <h3>🏡 동네 정보 설정</h3>
    <input type="text" id="t_name" placeholder="동네 이름">
    <textarea id="t_desc" rows="10" placeholder="상세 설명"></textarea>
    
    <div id="button-group"></div>
</div>

<script type="text/javascript" src="http://dapi.kakao.com/v2/maps/sdk.js?appkey=4221957d3296d5b1b0a48b671070d6cc"></script>

<script>
    var mapContainer = document.getElementById('map');
    var mapOption = { center: new kakao.maps.LatLng(37.566826, 126.9786567), level: 3 };
    var map = new kakao.maps.Map(mapContainer, mapOption);

    var isDrawing = false;
    var drawingPoints = [];
    var clickline = null;
    var moveLine = null;
    var startMarker = null;
    var activePolygon = null;
    var isPolygonClicked = false;

    function toggleDrawing(status) {
        isDrawing = status;
        if (status) {
            document.body.classList.add('draw-mode');
            resetDrawing();
            closeSidebar();
        } else {
            document.body.classList.remove('draw-mode');
        }
    }

    function resetDrawing() {
        if(clickline) clickline.setMap(null);
        if(moveLine) moveLine.setMap(null);
        if(startMarker) startMarker.setMap(null);
        drawingPoints = []; clickline = null; moveLine = null; startMarker = null;
    }

    kakao.maps.event.addListener(map, 'click', function() {
        if (!isDrawing && !isPolygonClicked) {
            closeSidebar();
        }
        isPolygonClicked = false;
    });

    kakao.maps.event.addListener(map, 'mousedown', function(mouseEvent) {
        if (!isDrawing) return;
        var latlng = mouseEvent.latLng;
        if (drawingPoints.length > 2) {
            var startP = drawingPoints[0];
            var dist = Math.sqrt(Math.pow(startP.getLat()-latlng.getLat(),2) + Math.pow(startP.getLng()-latlng.getLng(),2));
            if (dist < 0.0001) { finishDrawing(); return; }
        }
        addPoint(latlng);
    });

    function addPoint(latlng) {
        drawingPoints.push(latlng);
        if (drawingPoints.length === 1) {
            startMarker = new kakao.maps.Circle({ center: latlng, radius: 4, strokeWeight: 1, strokeColor: '#f00', fillColor: '#f00', fillOpacity: 1, map: map, zIndex: 100 });
        }
        if (!clickline) {
            clickline = new kakao.maps.Polyline({ map: map, path: [latlng], strokeWeight: 3, strokeColor: '#3498db' });
            moveLine = new kakao.maps.Polyline({ map: map, path: [latlng, latlng], strokeWeight: 2, strokeColor: '#3498db', strokeStyle: 'dash' });
        } else {
            clickline.setPath(drawingPoints);
        }
    }

    kakao.maps.event.addListener(map, 'mousemove', function(mouseEvent) {
        if (isDrawing && drawingPoints.length > 0) {
            moveLine.setPath([drawingPoints[drawingPoints.length - 1], mouseEvent.latLng]);
        }
    });

    // 폴리곤 완성 로직
    function finishDrawing() {
        var polygon = new kakao.maps.Polygon({
            map: map, path: drawingPoints, strokeWeight: 3, strokeColor: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 0.3, zIndex: 10, clickable: true
        });

        polygon.myData = { name: "", desc: "", saved: false }; // saved 플래그 추가

        var internalHandler = function(e) {
            if (e.preventMap) e.preventMap();
            if (e.domEvent && e.domEvent.stopPropagation) e.domEvent.stopPropagation();
            isPolygonClicked = true;
            openSidebar(polygon);
        };

        kakao.maps.event.addListener(polygon, 'mousedown', internalHandler);
        kakao.maps.event.addListener(polygon, 'click', internalHandler);
        kakao.maps.event.addListener(polygon, 'mouseover', function() { mapContainer.classList.add('poly-hover'); });
        kakao.maps.event.addListener(polygon, 'mouseout', function() { mapContainer.classList.remove('poly-hover'); });

        isPolygonClicked = true;
        openSidebar(polygon);
        toggleDrawing(false);
        resetDrawing();
        setTimeout(() => { isPolygonClicked = false; }, 100);
    }

    // 🚨 핵심: 상황에 맞는 버튼 렌더링
    function openSidebar(poly) {
        activePolygon = poly;
        document.getElementById('t_name').value = poly.myData.name;
        document.getElementById('t_desc').value = poly.myData.desc;
        
        var btnGroup = document.getElementById('button-group');
        
        if (!poly.myData.saved) {
            // 최초 저장 시: 저장 버튼만
            btnGroup.innerHTML = '<button class="btn-full save-color" onclick="saveData()">최초 정보 저장</button>';
        } else {
            // 이미 저장된 객체: 수정 및 삭제 버튼
            btnGroup.innerHTML = `
                <button class="btn-full edit-color" onclick="saveData()">정보 수정</button>
                <button class="btn-full delete-color" onclick="deletePolygon()">영역 삭제</button>
            `;
        }
        
        document.getElementById('sidebar').classList.add('open');
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        activePolygon = null;
    }

    // 저장/수정 공통 함수
    function saveData() {
        if (!activePolygon) return;
        var name = document.getElementById('t_name').value;
        if (!name) { alert("동네 이름을 입력해주세요!"); return; }

        activePolygon.myData.name = name;
        activePolygon.myData.desc = document.getElementById('t_desc').value;
        activePolygon.myData.saved = true; // 저장 완료 표시

        activePolygon.setOptions({ strokeColor: '#2ecc71', fillColor: '#2ecc71', fillOpacity: 0.5 });
        alert("정보가 반영되었습니다.");
        closeSidebar();
    }

    // 🚨 삭제 함수
    function deletePolygon() {
        if (!activePolygon) return;
        
        if (confirm("정말로 이 영역을 삭제하시겠습니까? 한 번 지우면 복구할 수 없습니다.")) {
            activePolygon.setMap(null); // 지도에서 제거
            activePolygon = null; // 메모리 참조 제거
            alert("영역이 삭제되었습니다.");
            closeSidebar();
        }
    }
</script>
</body>
</html>
