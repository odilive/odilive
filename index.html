<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>어디살까? 자취하기 좋은 동네!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&family=S-Core+Dream:wght@900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --brand-teal: #085e6a;
        --brand-teal-dark: #06474f;
        --brand-teal-tint: #eaf4f3;
        --ink: #16282b;
        --ink-soft: #4c6467;
        --line: #dbe6e5;
      }

      body {
        margin: 0;
        padding: 20px;
        background-color: #f2f6f6;
        color: var(--ink);
        height: 100vh;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
      }

      body,
      button,
      input,
      select,
      textarea {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          sans-serif;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
        padding: 10px 5px;
        border-bottom: 2px solid var(--brand-teal);
        flex-shrink: 0;
      }
      .header h1 {
        margin: 0;
        font-size: clamp(15px, 4.5vw, 24px);
        white-space: nowrap;
        letter-spacing: -0.01em;
        font-family: "S-Core Dream", sans-serif;
        font-weight: 900;
        color: var(--brand-teal-dark);
      }

      .controls {
        margin-bottom: 15px;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
        overflow-x: auto;
      }

      .btn-logo {
        height: 18px;
        width: auto;
        vertical-align: middle;
        object-fit: contain;
      }

      #map {
        width: 100%;
        flex: 1;
        border-radius: 14px;
        border: 1px solid var(--line);
        box-shadow: 0 4px 16px rgba(8, 94, 106, 0.12);
      }
      .poly-hover {
        cursor: pointer !important;
      }

      .btn {
        font-family: inherit;
        padding: 8px 15px;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 0.01em;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          opacity 0.15s ease;
        background: #fff;
        border: 1px solid var(--line);
        color: var(--ink-soft);
        box-shadow: 0 1px 3px rgba(8, 94, 106, 0.08);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }
      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 10px rgba(8, 94, 106, 0.18);
      }
      .btn.active {
        color: white;
        border-color: transparent;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.18);
      }
      .btn.daiso.active {
        background: #e5001a;
      }
      .btn.olive.active {
        background: #82dc28;
      }
      .btn.star.active {
        background: #006241;
      }
      .btn.ssm.active {
        background: #f39c12;
      }
      .btn.library.active {
        background: #2b5c8f;
      }

      /* 상세 정보 패널 (PC: 오른쪽 슬라이드, 모바일: 하단 바텀시트) */
      #info-panel {
        position: fixed;
        top: 0;
        right: -400px;
        width: 340px;
        height: 100vh;
        background: white;
        z-index: 9999;
        padding: 32px 28px;
        box-shadow: -5px 0 24px rgba(8, 94, 106, 0.16);
        transition: 0.3s ease-out;
        box-sizing: border-box;
      }
      #info-panel.open {
        right: 0;
      }
      #info-panel h3 {
        margin: 0 0 14px;
        font-size: 19px;
        font-weight: 800;
        letter-spacing: -0.01em;
        color: var(--brand-teal-dark);
      }
      #info-facility-summary {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 18px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }
      #info-facility-summary span {
        background: var(--brand-teal-tint);
        color: var(--brand-teal-dark);
        padding: 4px 11px;
        border-radius: 20px;
        font-size: 12.5px;
        font-weight: bold;
        white-space: nowrap;
      }
      #info-panel p {
        white-space: pre-wrap;
        line-height: 1.7;
        color: var(--ink-soft);
        font-size: 14px;
      }
      .close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #93a5a6;
      }

      @media (max-width: 600px) {
        #info-panel {
          top: auto;
          right: 0;
          bottom: -100%;
          width: 100%;
          height: auto;
          max-height: 60vh;
          overflow-y: auto;
          border-radius: 16px 16px 0 0;
          box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.2);
        }
        #info-panel.open {
          bottom: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="logo.png" alt="어디살까 로고" style="height: 50px; width: auto" />
      <h1>어디살까? 자취하기 좋은 동네!</h1>
    </div>

    <div class="controls">
      <button id="filter-daiso" class="btn daiso active" onclick="toggleBrand('다이소')">
        <img src="daiso.png" alt="다이소" class="btn-logo" /> &nbsp;다이소
      </button>
      <button id="filter-olive" class="btn olive active" onclick="toggleBrand('올리브영')">
        <img src="olive.png" alt="올리브영" class="btn-logo" /> &nbsp;올리브영
      </button>
      <button id="filter-star" class="btn star active" onclick="toggleBrand('스타벅스')">
        <img src="starbucks.png" alt="스타벅스" class="btn-logo" /> &nbsp;스타벅스
      </button>
      <button id="filter-ssm" class="btn ssm active" onclick="toggleBrand('대형슈퍼')">
        <img src="ssm.png" alt="대형슈퍼" class="btn-logo" /> &nbsp;대형슈퍼
      </button>
      <button id="filter-library" class="btn library active" onclick="toggleBrand('도서관')">
        <img src="library.png" alt="도서관" class="btn-logo" /> &nbsp;도서관
      </button>
    </div>

    <div id="map"></div>

    <div id="info-panel">
      <button class="close-btn" onclick="closeInfoPanel()">&times;</button>
      <h3 id="info-name"></h3>
      <div id="info-facility-summary"></div>
      <p id="info-desc"></p>
    </div>

    <script
      type="text/javascript"
      src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4221957d3296d5b1b0a48b671070d6cc&libraries=services"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      var SUPABASE_URL = "https://luibrbeiykqyyeatornq.supabase.co";
      var SUPABASE_KEY = "sb_publishable_GN4Ql4F15uqNfSPgWE1T-A_9d5t0fZm";
      var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      var mapContainer = document.getElementById("map");
      var mapOption = {
        center: new kakao.maps.LatLng(37.53, 126.9785), // 용산공원 일대
        level: 8,
      };
      var map = new kakao.maps.Map(mapContainer, mapOption);
      var ps = new kakao.maps.services.Places();

      var brandData = {
        올리브영: {
          active: true,
          markers: {},
          keywords: ["올리브영 드럭스토어"],
          btnId: "filter-olive",
          icon: "olive.png",
        },
        다이소: {
          active: true,
          markers: {},
          keywords: ["다이소 생활용품점"],
          btnId: "filter-daiso",
          icon: "daiso.png",
        },
        스타벅스: {
          active: true,
          markers: {},
          keywords: ["스타벅스 커피전문점"],
          btnId: "filter-star",
          icon: "starbucks.png",
        },
        대형슈퍼: {
          active: true,
          markers: {},
          keywords: ["대형슈퍼"],
          categories: ["MT1"], // 카카오 공식 '대형마트' 분류 (이마트·홈플러스·롯데마트·코스트코 등)
          btnId: "filter-ssm",
          icon: "ssm.png",
        },
        도서관: {
          active: true,
          markers: {},
          keywords: ["국공립도서관"],
          btnId: "filter-library",
          icon: "library.png",
        },
      };

      var infoWindow = new kakao.maps.InfoWindow({ zIndex: 999 });

      function updateBrandMarkers() {
        var bounds = map.getBounds();
        var level = map.getLevel();
        var isZoomIn = level <= 5;

        var brandPriority = {
          대형슈퍼: 100,
          다이소: 90,
          스타벅스: 80,
          올리브영: 70,
          도서관: 60,
        };

        Object.keys(brandData).forEach((brand) => {
          if (!brandData[brand].active) return;

          // 키워드 검색과 카테고리 검색이 같은 결과 처리기를 공유 (place.id 기준으로 중복 방지)
          var handleResults = function (data, status) {
            if (status === kakao.maps.services.Status.OK) {
              data.forEach((place) => {
                var finalIcon = brandData[brand].icon;

                if (!brandData[brand].markers[place.id]) {
                  var imageSize = new kakao.maps.Size(35, 35);
                  var markerImage = new kakao.maps.MarkerImage(finalIcon, imageSize);

                  var marker = new kakao.maps.Marker({
                    position: new kakao.maps.LatLng(place.y, place.x),
                    image: markerImage,
                    map: isZoomIn ? map : null,
                    zIndex: brandPriority[brand] || 10,
                  });

                  if (brand === "대형슈퍼" || brand === "도서관") {
                    var content = `
                      <div style="padding:6px 10px; font-size:12px; font-weight:bold; color:#06474f; white-space:nowrap; text-align:center; font-family:sans-serif;">
                        ${place.place_name}
                      </div>
                    `;
                    kakao.maps.event.addListener(marker, "mouseover", function () {
                      infoWindow.setContent(content);
                      infoWindow.open(map, marker);
                    });
                    kakao.maps.event.addListener(marker, "mouseout", function () {
                      infoWindow.close();
                    });
                  }

                  kakao.maps.event.addListener(marker, "click", function () {
                    if (place.place_url) {
                      window.open(place.place_url, "_blank");
                    }
                  });

                  brandData[brand].markers[place.id] = marker;
                }
              });
            }
          };

          brandData[brand].keywords.forEach((keyword) => {
            ps.keywordSearch(keyword, handleResults, { bounds: bounds });
          });
          (brandData[brand].categories || []).forEach((code) => {
            ps.categorySearch(code, handleResults, { bounds: bounds });
          });
        });
      }

      function toggleBrand(brand) {
        var state = brandData[brand];
        state.active = !state.active;
        document.getElementById(state.btnId).classList.toggle("active");
        Object.values(state.markers).forEach((marker) => {
          marker.setMap(state.active ? map : null);
        });
        if (state.active) updateBrandMarkers();
      }

      kakao.maps.event.addListener(map, "idle", updateBrandMarkers);
      kakao.maps.event.addListener(map, "zoom_changed", function () {
        var level = map.getLevel();
        var showMarkers = level <= 5;
        Object.keys(brandData).forEach((brand) => {
          var state = brandData[brand];
          if (state.active) {
            Object.values(state.markers).forEach((marker) => {
              marker.setMap(showMarkers ? map : null);
            });
          }
        });
        updateNeighborhoodVisibility();
      });
      updateBrandMarkers();

      // ── 저장된 동네 불러오기 (읽기 전용) ──
      var isPolygonClicked = false;
      var NEIGHBORHOOD_ZOOM_THRESHOLD = 5; // 이 레벨보다 확대되면(숫자가 작아지면) 폴리곤, 아니면 마커
      var neighborhoods = [];
      var subMarkers = [];

      function clearSubMarkers() {
        subMarkers.forEach(function (marker) {
          marker.setMap(null);
        });
        subMarkers = [];
      }

      // 저장 시점에 DB에 스냅샷된 편의점/약국/빨래방을 이모지로 표출 (API 재호출 없음)
      function renderCachedFacilities(facilities) {
        clearSubMarkers();
        facilities.forEach(function (f) {
          var content = `
            <div style="font-size: 16px; line-height: 1; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.3)); cursor: default; user-select: none;">
              ${f.emoji}
            </div>
          `;
          var customOverlay = new kakao.maps.CustomOverlay({
            position: new kakao.maps.LatLng(f.lat, f.lng),
            content: content,
            xAnchor: 0.5,
            yAnchor: 0.5,
          });
          customOverlay.setMap(map);
          subMarkers.push(customOverlay);
        });
      }

      function buildFacilitySummary(facilities) {
        var counts = {};
        var order = [];
        (facilities || []).forEach(function (f) {
          if (!(f.type in counts)) {
            order.push(f.type);
            counts[f.type] = { emoji: f.emoji, count: 0 };
          }
          counts[f.type].count += 1;
        });
        return order
          .map(function (type) {
            return (
              "<span>" +
              counts[type].emoji +
              " " +
              type +
              " " +
              counts[type].count +
              "</span>"
            );
          })
          .join("");
      }

      function openInfoPanel(name, desc, facilities) {
        document.getElementById("info-name").textContent = name;
        document.getElementById("info-facility-summary").innerHTML =
          buildFacilitySummary(facilities);
        document.getElementById("info-desc").textContent = desc || "";
        document.getElementById("info-panel").classList.add("open");
        renderCachedFacilities(facilities || []);
      }

      function closeInfoPanel() {
        clearSubMarkers();
        document.getElementById("info-panel").classList.remove("open");
      }

      // 현재 줌 레벨에 따라 폴리곤 ↔ 마커 표시를 전환
      function updateNeighborhoodVisibility() {
        var showPolygons = map.getLevel() <= NEIGHBORHOOD_ZOOM_THRESHOLD;
        neighborhoods.forEach(function (n) {
          n.polygon.setMap(showPolygons ? map : null);
          n.marker.setMap(showPolygons ? null : map);
        });
      }

      async function loadNeighborhoods() {
        var { data, error } = await sb.from("neighborhoods").select("*");
        if (error) {
          console.error("동네 목록 로딩 실패:", error);
          return;
        }
        data.forEach(function (row) {
          var path = row.polygon.map(function (p) {
            return new kakao.maps.LatLng(p.lat, p.lng);
          });
          var bounds = new kakao.maps.LatLngBounds();
          path.forEach(function (latlng) {
            bounds.extend(latlng);
          });

          var polygon = new kakao.maps.Polygon({
            map: null,
            path: path,
            strokeWeight: 3,
            strokeColor: "#085e6a",
            fillColor: "#085e6a",
            fillOpacity: 0.45,
            zIndex: 10,
            clickable: true,
          });

          var handler = function (e) {
            if (e.preventMap) e.preventMap();
            if (e.domEvent && e.domEvent.stopPropagation) e.domEvent.stopPropagation();
            isPolygonClicked = true;
            openInfoPanel(row.name, row.description, row.facilities);
          };
          kakao.maps.event.addListener(polygon, "mousedown", handler);
          kakao.maps.event.addListener(polygon, "click", handler);
          kakao.maps.event.addListener(polygon, "mouseover", function () {
            mapContainer.classList.add("poly-hover");
          });
          kakao.maps.event.addListener(polygon, "mouseout", function () {
            mapContainer.classList.remove("poly-hover");
          });

          // 축소 상태에서 보여줄 이름표 마커
          var markerEl = document.createElement("div");
          markerEl.textContent = "🏘️ " + row.name;
          markerEl.style.cssText =
            "background:white; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:bold; color:#06474f; box-shadow:0 2px 8px rgba(8,94,106,0.25); white-space:nowrap; cursor:pointer; border:2px solid #085e6a;";
          markerEl.addEventListener("click", function (e) {
            e.stopPropagation();
            isPolygonClicked = true;
            map.setBounds(bounds);
            updateNeighborhoodVisibility();
            openInfoPanel(row.name, row.description, row.facilities);
          });

          var sw = bounds.getSouthWest();
          var ne = bounds.getNorthEast();
          var center = new kakao.maps.LatLng(
            (sw.getLat() + ne.getLat()) / 2,
            (sw.getLng() + ne.getLng()) / 2,
          );

          var marker = new kakao.maps.CustomOverlay({
            position: center,
            content: markerEl,
            map: null,
            yAnchor: 0.5,
          });

          neighborhoods.push({ polygon: polygon, marker: marker, bounds: bounds });
        });
        updateNeighborhoodVisibility();
      }
      loadNeighborhoods();

      kakao.maps.event.addListener(map, "click", function () {
        if (!isPolygonClicked) {
          closeInfoPanel();
        }
        isPolygonClicked = false;
      });
    </script>
  </body>
</html>
