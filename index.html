<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>어디살까? 자취하기 좋은 동네!</title>
    <meta
      name="description"
      content="1인가구 자취생을 위한 동네 추천 지도. 직접 걸어보고 큐레이션한 동네 정보를 소개합니다."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="어디살까 - 자취하기 좋은 동네 지도" />
    <meta
      property="og:description"
      content="직접 걸어보고 큐레이션한 1인가구 동네 추천 지도"
    />
    <meta
      property="og:image"
      content="https://odilive.github.io/odilive/og-image.png"
    />
    <meta property="og:url" content="https://odilive.github.io/odilive/" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&family=S-Core+Dream:wght@900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --brand-teal: #085e6a;
        --brand-teal-dark: #06474f;
        --brand-teal-tint: #eaf4f3;
        --ink: #16282b;
        --ink-soft: #4c6467;
        --line: #dbe6e5;
      }

      body {
        margin: 0;
        padding: 20px;
        background-color: #f2f6f6;
        color: var(--ink);
        height: 100vh;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
      }

      body,
      button,
      input,
      select,
      textarea {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          sans-serif;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
        padding: 10px 5px;
        border-bottom: 2px solid var(--brand-teal);
        flex-shrink: 0;
      }
      .header h1 {
        margin: 0;
        font-size: clamp(15px, 4.5vw, 24px);
        white-space: nowrap;
        letter-spacing: -0.01em;
        font-family: "S-Core Dream", sans-serif;
        font-weight: 900;
        color: var(--brand-teal-dark);
      }

      .controls {
        margin-bottom: 15px;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
        overflow-x: auto;
      }

      #theme-select {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 10;
        font-family: inherit;
        font-size: 13px;
        font-weight: bold;
        padding: 8px 12px;
        border-radius: 20px;
        border: 2px solid var(--brand-teal);
        color: var(--brand-teal-dark);
        background: #fff;
        cursor: pointer;
        box-shadow: 0 2px 10px rgba(8, 94, 106, 0.25);
      }

      .btn-logo {
        height: 18px;
        width: auto;
        vertical-align: middle;
        object-fit: contain;
      }

      #map-wrap {
        position: relative;
        flex: 1;
        min-height: 0;
      }
      #map {
        width: 100%;
        height: 100%;
        border-radius: 14px;
        border: 1px solid var(--line);
        box-sizing: border-box;
        box-shadow: 0 4px 16px rgba(8, 94, 106, 0.12);
      }
      .poly-hover {
        cursor: pointer !important;
      }

      .btn {
        font-family: inherit;
        padding: 8px 15px;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 0.01em;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          opacity 0.15s ease;
        background: #fff;
        border: 1px solid var(--line);
        color: var(--ink-soft);
        box-shadow: 0 1px 3px rgba(8, 94, 106, 0.08);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }
      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 10px rgba(8, 94, 106, 0.18);
      }
      .btn.active {
        color: white;
        border-color: transparent;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.18);
      }
      .btn.daiso.active {
        background: #e5001a;
      }
      .btn.olive.active {
        background: #82dc28;
      }
      .btn.star.active {
        background: #006241;
      }
      .btn.ssm.active {
        background: #f39c12;
      }

      /* 상세 정보 패널 (PC: 오른쪽 슬라이드, 모바일: 하단 바텀시트) */
      #info-panel {
        position: fixed;
        top: 0;
        right: -400px;
        width: 390px;
        height: 100vh;
        background: white;
        z-index: 9999;
        padding: 32px 28px 20px;
        box-shadow: -5px 0 24px rgba(8, 94, 106, 0.16);
        transition: 0.3s ease-out;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }
      #info-scroll {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }
      #info-panel.open {
        right: 0;
      }
      #info-panel h3 {
        margin: 0 0 6px;
        font-size: 19px;
        font-weight: 800;
        letter-spacing: -0.01em;
        color: var(--brand-teal-dark);
      }
      #info-tagline {
        font-size: 13.5px;
        font-weight: 600;
        color: var(--brand-teal);
        margin-bottom: 16px;
      }
      #info-tagline:empty {
        display: none;
      }
      #info-desc {
        margin-bottom: 16px;
      }
      #info-desc .desc-heading {
        font-size: 13px;
        font-weight: 800;
        color: var(--brand-teal-dark);
        margin: 12px 0 3px;
      }
      #info-desc .desc-heading:first-child {
        margin-top: 0;
      }
      #info-desc .desc-line {
        font-size: 14px;
        color: var(--ink-soft);
        line-height: 1.7;
      }
      #info-specs {
        margin-bottom: 16px;
      }
      #info-specs div {
        display: flex;
        gap: 10px;
        font-size: 13px;
        line-height: 1.6;
        margin-bottom: 3px;
      }
      #info-specs .spec-label {
        flex-shrink: 0;
        width: 28px;
        font-weight: bold;
        color: var(--brand-teal);
      }
      #info-specs .spec-text {
        color: var(--ink-soft);
      }
      #info-links {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        flex-shrink: 0;
      }
      #info-links:empty {
        display: none;
      }
      #info-links a {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: bold;
        text-decoration: none;
      }
      #info-links a svg {
        flex-shrink: 0;
      }
      #info-links .link-youtube {
        background: #fdeaea;
        color: #c0392b;
      }
      #info-links .link-blog {
        background: #e7f7ee;
        color: #059e4a;
      }
      #info-facts {
        border-top: 1px solid var(--line);
        padding-top: 16px;
      }
      #info-amenities {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      #info-amenities:empty {
        display: none;
      }
      #info-amenities span {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12.5px;
        font-weight: bold;
        white-space: nowrap;
      }
      #info-amenities .grade-O {
        background: var(--brand-teal-tint);
        color: var(--brand-teal-dark);
      }
      #info-amenities .grade-half {
        background: #fdf0e3;
        color: #c76a15;
      }
      #info-amenities .grade-X {
        background: #eef1f1;
        color: #8a9a9b;
      }
      #info-facility-summary {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 16px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--line);
      }
      #info-facility-summary span {
        font-size: 13px;
        color: var(--ink-soft);
        white-space: nowrap;
      }
      #info-panel p {
        white-space: pre-wrap;
        line-height: 1.7;
        color: var(--ink-soft);
        font-size: 14px;
      }
      .close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #93a5a6;
      }

      @media (max-width: 600px) {
        #info-panel {
          top: auto;
          right: 0;
          bottom: -100%;
          width: 100%;
          height: auto;
          max-height: 60vh;
          border-radius: 16px 16px 0 0;
          box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.2);
        }
        #info-panel.open {
          bottom: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="logo.png" alt="어디살까 로고" style="height: 50px; width: auto" />
      <h1>어디살까? 자취하기 좋은 동네!</h1>
    </div>

    <div class="controls">
      <button id="filter-daiso" class="btn daiso active" onclick="toggleBrand('다이소')">
        <img src="daiso.png" alt="다이소" class="btn-logo" /> &nbsp;다이소
      </button>
      <button id="filter-olive" class="btn olive active" onclick="toggleBrand('올리브영')">
        <img src="olive.png" alt="올리브영" class="btn-logo" /> &nbsp;올리브영
      </button>
      <button id="filter-star" class="btn star active" onclick="toggleBrand('스타벅스')">
        <img src="starbucks.png" alt="스타벅스" class="btn-logo" /> &nbsp;스타벅스
      </button>
      <button id="filter-ssm" class="btn ssm active" onclick="toggleBrand('대형슈퍼')">
        <img src="ssm.png" alt="대형슈퍼" class="btn-logo" /> &nbsp;대형슈퍼
      </button>
    </div>

    <div id="map-wrap">
      <div id="map"></div>
      <select id="theme-select" onchange="onThemeChange()">
        <option value="">🧭 테마 선택</option>
        <option value="혼밥">🍚 혼밥 지도</option>
        <option value="공부">✏️ 공부 지도</option>
      </select>
    </div>

    <div id="info-panel">
      <button class="close-btn" onclick="closeInfoPanel()">&times;</button>
      <div id="info-scroll">
        <h3 id="info-name"></h3>
        <div id="info-tagline"></div>
        <div id="info-desc"></div>
        <div id="info-specs"></div>
        <div id="info-facts">
          <div id="info-amenities"></div>
          <div id="info-facility-summary"></div>
        </div>
      </div>
      <div id="info-links"></div>
    </div>

    <script
      type="text/javascript"
      src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4221957d3296d5b1b0a48b671070d6cc&libraries=services"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      var SUPABASE_URL = "https://luibrbeiykqyyeatornq.supabase.co";
      var SUPABASE_KEY = "sb_publishable_GN4Ql4F15uqNfSPgWE1T-A_9d5t0fZm";
      var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      var mapContainer = document.getElementById("map");
      var mapOption = {
        center: new kakao.maps.LatLng(37.53, 126.9785), // 용산공원 일대
        level: 8,
      };
      var map = new kakao.maps.Map(mapContainer, mapOption);
      var ps = new kakao.maps.services.Places();

      var brandData = {
        올리브영: {
          active: true,
          markers: {},
          keywords: ["올리브영 드럭스토어"],
          btnId: "filter-olive",
          icon: "olive.png",
        },
        다이소: {
          active: true,
          markers: {},
          keywords: ["다이소 생활용품점"],
          btnId: "filter-daiso",
          icon: "daiso.png",
        },
        스타벅스: {
          active: true,
          markers: {},
          keywords: ["스타벅스 커피전문점"],
          btnId: "filter-star",
          icon: "starbucks.png",
        },
        대형슈퍼: {
          active: true,
          markers: {},
          keywords: ["대형슈퍼"],
          categories: ["MT1"], // 카카오 공식 '대형마트' 분류 (이마트·홈플러스·롯데마트·코스트코 등)
          btnId: "filter-ssm",
          icon: "ssm.png",
        },
      };

      var infoWindow = new kakao.maps.InfoWindow({ zIndex: 999 });

      function updateBrandMarkers() {
        var bounds = map.getBounds();
        var level = map.getLevel();
        var isZoomIn = level <= 5;

        var brandPriority = {
          대형슈퍼: 100,
          다이소: 90,
          스타벅스: 80,
          올리브영: 70,
        };

        Object.keys(brandData).forEach((brand) => {
          if (!brandData[brand].active) return;

          // 키워드 검색과 카테고리 검색이 같은 결과 처리기를 공유 (place.id 기준으로 중복 방지)
          var handleResults = function (data, status) {
            if (status === kakao.maps.services.Status.OK) {
              data.forEach((place) => {
                var finalIcon = brandData[brand].icon;

                if (!brandData[brand].markers[place.id]) {
                  var imageSize = new kakao.maps.Size(35, 35);
                  var markerImage = new kakao.maps.MarkerImage(finalIcon, imageSize);

                  var marker = new kakao.maps.Marker({
                    position: new kakao.maps.LatLng(place.y, place.x),
                    image: markerImage,
                    map: isZoomIn ? map : null,
                    zIndex: brandPriority[brand] || 10,
                  });

                  if (brand === "대형슈퍼") {
                    var content = `
                      <div style="padding:6px 10px; font-size:12px; font-weight:bold; color:#06474f; white-space:nowrap; text-align:center; font-family:sans-serif;">
                        ${place.place_name}
                      </div>
                    `;
                    kakao.maps.event.addListener(marker, "mouseover", function () {
                      infoWindow.setContent(content);
                      infoWindow.open(map, marker);
                    });
                    kakao.maps.event.addListener(marker, "mouseout", function () {
                      infoWindow.close();
                    });
                  }

                  kakao.maps.event.addListener(marker, "click", function () {
                    if (place.place_url) {
                      window.open(place.place_url, "_blank");
                    }
                  });

                  brandData[brand].markers[place.id] = marker;
                }
              });
            }
          };

          brandData[brand].keywords.forEach((keyword) => {
            ps.keywordSearch(keyword, handleResults, { bounds: bounds });
          });
          (brandData[brand].categories || []).forEach((code) => {
            ps.categorySearch(code, handleResults, { bounds: bounds });
          });
        });
      }

      function toggleBrand(brand) {
        var state = brandData[brand];
        state.active = !state.active;
        document.getElementById(state.btnId).classList.toggle("active");
        Object.values(state.markers).forEach((marker) => {
          marker.setMap(state.active ? map : null);
        });
        if (state.active) updateBrandMarkers();
      }

      kakao.maps.event.addListener(map, "idle", updateBrandMarkers);
      kakao.maps.event.addListener(map, "zoom_changed", function () {
        var level = map.getLevel();
        var showMarkers = level <= 5;
        Object.keys(brandData).forEach((brand) => {
          var state = brandData[brand];
          if (state.active) {
            Object.values(state.markers).forEach((marker) => {
              marker.setMap(showMarkers ? map : null);
            });
          }
        });
        updateNeighborhoodVisibility();
      });
      updateBrandMarkers();

      // ── 저장된 동네 불러오기 (읽기 전용) ──
      var isPolygonClicked = false;
      var NEIGHBORHOOD_ZOOM_THRESHOLD = 5; // 이 레벨보다 확대되면(숫자가 작아지면) 폴리곤, 아니면 마커
      var neighborhoods = [];
      var subMarkers = [];

      function clearSubMarkers() {
        subMarkers.forEach(function (marker) {
          marker.setMap(null);
        });
        subMarkers = [];
      }

      // 저장 시점에 DB에 스냅샷된 편의점/약국/빨래방을 이모지로 표출 (API 재호출 없음)
      function renderCachedFacilities(facilities) {
        clearSubMarkers();
        facilities.forEach(function (f) {
          var content = `
            <div style="font-size: 16px; line-height: 1; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.3)); cursor: default; user-select: none;">
              ${f.emoji}
            </div>
          `;
          var customOverlay = new kakao.maps.CustomOverlay({
            position: new kakao.maps.LatLng(f.lat, f.lng),
            content: content,
            xAnchor: 0.5,
            yAnchor: 0.5,
          });
          customOverlay.setMap(map);
          subMarkers.push(customOverlay);
        });
      }

      // 편·약·빨 세 항목을 0개여도 항상 고정 표시
      var FACILITY_TYPES = [
        { type: "편의점", label: "편의점", emoji: "🏪" },
        { type: "약국", label: "약국", emoji: "💊" },
        { type: "셀프빨래방", label: "빨래방", emoji: "🧺" },
      ];

      function buildFacilitySummary(facilities) {
        return FACILITY_TYPES.map(function (ft) {
          var count = (facilities || []).filter(function (f) {
            return f.type === ft.type;
          }).length;
          return "<span>" + ft.emoji + " " + ft.label + " " + count + "</span>";
        }).join("");
      }

      // 다이소/올리브영/대형슈퍼 ○/△/✕ 칩 (관리자가 직접 판정한 값)
      function buildAmenityChips(amenities) {
        var GRADE_DISPLAY = { O: "○", "△": "△", X: "✕" };
        var GRADE_CLASS = { O: "grade-O", "△": "grade-half", X: "grade-X" };
        var AMENITY_LOGO = {
          다이소: "daiso.png",
          올리브영: "olive.png",
          대형슈퍼: "ssm.png",
        };
        return ["다이소", "올리브영", "대형슈퍼"]
          .filter(function (item) {
            return amenities && amenities[item];
          })
          .map(function (item) {
            var g = amenities[item];
            return (
              '<span class="' +
              GRADE_CLASS[g] +
              '"><img src="' +
              AMENITY_LOGO[item] +
              '" alt="" style="height:15px; width:auto; vertical-align:-3px; margin-right:4px;">' +
              item +
              " " +
              GRADE_DISPLAY[g] +
              "</span>"
            );
          })
          .join("");
      }

      // [소제목] 으로 시작하는 줄을 굵은 소제목으로 렌더링
      function renderDescription(text) {
        function esc(s) {
          return s
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }
        return (text || "")
          .split("\n")
          .map(function (line) {
            var m = line.match(/^\[(.+?)\]\s*(.*)$/);
            if (m) {
              return (
                '<div class="desc-heading">' +
                esc(m[1]) +
                "</div>" +
                (m[2] ? '<div class="desc-line">' + esc(m[2]) + "</div>" : "")
              );
            }
            if (line.trim() === "") return "";
            return '<div class="desc-line">' + esc(line) + "</div>";
          })
          .join("");
      }

      function openInfoPanel(row) {
        document.getElementById("info-name").textContent = row.name;
        document.getElementById("info-tagline").textContent = row.tagline
          ? "“" + row.tagline + "”"
          : "";
        document.getElementById("info-desc").innerHTML = renderDescription(
          row.description,
        );

        var specs = "";
        if (row.transit)
          specs +=
            '<div><span class="spec-label">교통</span><span class="spec-text">' +
            row.transit +
            "</span></div>";
        if (row.price)
          specs +=
            '<div><span class="spec-label">시세</span><span class="spec-text">' +
            row.price +
            "</span></div>";
        document.getElementById("info-specs").innerHTML = specs;

        document.getElementById("info-amenities").innerHTML =
          buildAmenityChips(row.amenities);
        document.getElementById("info-facility-summary").innerHTML =
          buildFacilitySummary(row.facilities);

        var YT_ICON =
          '<svg width="17" height="17" viewBox="0 0 24 24"><path fill="#FF0000" d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.4 31.4 0 0 0 0 12a31.4 31.4 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.4 31.4 0 0 0 24 12a31.4 31.4 0 0 0-.5-5.8z"/><path fill="#fff" d="M9.5 15.5v-7l6.3 3.5-6.3 3.5z"/></svg>';
        var NAVER_ICON =
          '<svg width="13" height="13" viewBox="0 0 20 20"><rect width="20" height="20" rx="3" fill="#03C75A"/><path fill="#fff" d="M11.35 10.25 8.5 6.19H5.81v7.62H8.5v-4.06l2.85 4.06h2.69V6.19h-2.69v4.06z"/></svg>';

        var links = "";
        if (row.youtube_url)
          links +=
            '<a class="link-youtube" href="' +
            row.youtube_url +
            '" target="_blank">' +
            YT_ICON +
            " 답사 영상</a>";
        if (row.blog_url)
          links +=
            '<a class="link-blog" href="' +
            row.blog_url +
            '" target="_blank">' +
            NAVER_ICON +
            " 소개글 전문</a>";
        document.getElementById("info-links").innerHTML = links;

        document.getElementById("info-panel").classList.add("open");
        renderCachedFacilities(row.facilities || []);
      }

      function closeInfoPanel() {
        clearSubMarkers();
        document.getElementById("info-panel").classList.remove("open");
      }

      // 현재 줌 레벨에 따라 폴리곤 ↔ 마커 표시를 전환
      function updateNeighborhoodVisibility() {
        var showPolygons = map.getLevel() <= NEIGHBORHOOD_ZOOM_THRESHOLD;
        neighborhoods.forEach(function (n) {
          n.polygon.setMap(showPolygons ? map : null);
          n.marker.setMap(showPolygons ? null : map);
        });
      }

      async function loadNeighborhoods() {
        var { data, error } = await sb.from("neighborhoods").select("*");
        if (error) {
          console.error("동네 목록 로딩 실패:", error);
          return;
        }
        data.forEach(function (row) {
          var path = row.polygon.map(function (p) {
            return new kakao.maps.LatLng(p.lat, p.lng);
          });
          var bounds = new kakao.maps.LatLngBounds();
          path.forEach(function (latlng) {
            bounds.extend(latlng);
          });

          var polygon = new kakao.maps.Polygon({
            map: null,
            path: path,
            strokeWeight: 3,
            strokeColor: "#085e6a",
            fillColor: "#085e6a",
            fillOpacity: 0.45,
            zIndex: 10,
            clickable: true,
          });

          var handler = function (e) {
            if (e.preventMap) e.preventMap();
            if (e.domEvent && e.domEvent.stopPropagation) e.domEvent.stopPropagation();
            isPolygonClicked = true;
            openInfoPanel(row);
          };
          kakao.maps.event.addListener(polygon, "mousedown", handler);
          kakao.maps.event.addListener(polygon, "click", handler);
          kakao.maps.event.addListener(polygon, "mouseover", function () {
            mapContainer.classList.add("poly-hover");
          });
          kakao.maps.event.addListener(polygon, "mouseout", function () {
            mapContainer.classList.remove("poly-hover");
          });

          // 축소 상태에서 보여줄 이름표 마커
          var markerEl = document.createElement("div");
          markerEl.textContent = "🏘️ " + row.name;
          markerEl.style.cssText =
            "background:white; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:bold; color:#06474f; box-shadow:0 2px 8px rgba(8,94,106,0.25); white-space:nowrap; cursor:pointer; border:2px solid #085e6a;";
          markerEl.addEventListener("click", function (e) {
            e.stopPropagation();
            isPolygonClicked = true;
            map.setBounds(bounds);
            updateNeighborhoodVisibility();
            openInfoPanel(row);
          });

          var sw = bounds.getSouthWest();
          var ne = bounds.getNorthEast();
          var center = new kakao.maps.LatLng(
            (sw.getLat() + ne.getLat()) / 2,
            (sw.getLng() + ne.getLng()) / 2,
          );

          var marker = new kakao.maps.CustomOverlay({
            position: center,
            content: markerEl,
            map: null,
            yAnchor: 0.5,
          });

          neighborhoods.push({ polygon: polygon, marker: marker, bounds: bounds });
        });
        updateNeighborhoodVisibility();
      }
      loadNeighborhoods();

      kakao.maps.event.addListener(map, "click", function () {
        if (!isPolygonClicked) {
          closeInfoPanel();
        }
        isPolygonClicked = false;
      });

      // ══════════════ 큐레이션 테마 레이어 ══════════════
      var CATEGORY_EMOJI = {
        밥: "🍚",
        커피: "☕",
        간식: "🍡",
        카페: "☕",
        도서관: "📚",
        열린공간: "🏛️",
      };
      var themePins = [];
      var themeInfoWindow = new kakao.maps.InfoWindow({
        zIndex: 1000,
        removable: true,
      });

      function clearThemePins() {
        themePins.forEach(function (p) {
          p.setMap(null);
        });
        themePins = [];
        themeInfoWindow.close();
      }

      async function onThemeChange() {
        var theme = document.getElementById("theme-select").value;
        clearThemePins();
        if (!theme) return;

        var { data, error } = await sb
          .from("curated_places")
          .select("*")
          .eq("layer", theme);
        if (error) {
          console.error("큐레이션 로딩 실패:", error);
          return;
        }
        data.forEach(function (place) {
          var emoji = CATEGORY_EMOJI[place.category] || "📌";
          var el = document.createElement("div");
          el.textContent = emoji + " " + place.name;
          el.style.cssText =
            "background:#085e6a; color:white; padding:5px 12px; border-radius:16px; font-size:12.5px; font-weight:bold; white-space:nowrap; cursor:pointer; box-shadow:0 2px 8px rgba(8,94,106,0.4);";

          var position = new kakao.maps.LatLng(place.lat, place.lng);
          el.addEventListener("click", function (e) {
            e.stopPropagation();
            var html =
              '<div style="padding:12px 15px; font-family:inherit; max-width:230px;">' +
              '<div style="font-weight:bold; font-size:14px; color:#06474f; margin-bottom:4px;">' +
              emoji +
              " " +
              place.name +
              "</div>" +
              (place.comment
                ? '<div style="font-size:12.5px; color:#555; line-height:1.5; margin-bottom:6px;">' +
                  place.comment +
                  "</div>"
                : "") +
              (place.link
                ? '<a href="' +
                  place.link +
                  '" target="_blank" style="font-size:12px; color:#085e6a; font-weight:bold;">카카오맵에서 보기 →</a>'
                : "") +
              "</div>";
            themeInfoWindow.setContent(html);
            themeInfoWindow.setPosition(position);
            themeInfoWindow.open(map);
          });

          var overlay = new kakao.maps.CustomOverlay({
            position: position,
            content: el,
            map: map, // 큐레이션 배지는 모든 줌 레벨에서 표시
            yAnchor: 1.2,
            zIndex: 50,
          });
          themePins.push(overlay);
        });
      }
    </script>
  </body>
</html>
